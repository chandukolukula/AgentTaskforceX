<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#3E2723"/>
    </linearGradient>
    <linearGradient id="cookieGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A574"/>
      <stop offset="100%" stop-color="#B8865A"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="300" height="400" fill="url(#bg)"/>
  <!-- Shine -->
  <ellipse cx="130" cy="85" rx="200" ry="105" fill="url(#shine)"/>
  <!-- Large cookie circles with dot patterns -->
  <circle cx="110" cy="145" r="52" fill="url(#cookieGrad)" opacity="0.75"/>
  <circle cx="110" cy="145" r="44" fill="none" stroke="rgba(180,120,60,0.4)" stroke-width="2"/>
  <!-- Cookie dots on big cookie -->
  <circle cx="95" cy="132" r="5" fill="rgba(80,40,20,0.5)"/>
  <circle cx="118" cy="127" r="6" fill="rgba(80,40,20,0.45)"/>
  <circle cx="130" cy="148" r="5" fill="rgba(80,40,20,0.5)"/>
  <circle cx="105" cy="158" r="4" fill="rgba(80,40,20,0.45)"/>
  <circle cx="122" cy="163" r="5" fill="rgba(80,40,20,0.4)"/>
  <circle cx="90" cy="150" r="4" fill="rgba(80,40,20,0.5)"/>
  <!-- Second cookie -->
  <circle cx="200" cy="130" r="42" fill="url(#cookieGrad)" opacity="0.65"/>
  <circle cx="200" cy="130" r="35" fill="none" stroke="rgba(180,120,60,0.35)" stroke-width="2"/>
  <!-- Cookie dots on second cookie -->
  <circle cx="188" cy="118" r="4" fill="rgba(80,40,20,0.45)"/>
  <circle cx="208" cy="115" r="5" fill="rgba(80,40,20,0.4)"/>
  <circle cx="215" cy="135" r="4" fill="rgba(80,40,20,0.45)"/>
  <circle cx="195" cy="143" r="5" fill="rgba(80,40,20,0.4)"/>
  <!-- Third small cookie -->
  <circle cx="155" cy="220" r="34" fill="url(#cookieGrad)" opacity="0.55"/>
  <circle cx="148" cy="213" r="4" fill="rgba(80,40,20,0.4)"/>
  <circle cx="163" cy="210" r="3" fill="rgba(80,40,20,0.35)"/>
  <circle cx="165" cy="228" r="4" fill="rgba(80,40,20,0.4)"/>
  <!-- Cookie crumbs -->
  <circle cx="55" cy="200" r="6" fill="rgba(212,165,116,0.3)"/>
  <circle cx="72" cy="215" r="4" fill="rgba(212,165,116,0.25)"/>
  <circle cx="248" cy="195" r="5" fill="rgba(212,165,116,0.3)"/>
  <circle cx="235" cy="215" r="4" fill="rgba(212,165,116,0.25)"/>
  <!-- Scattered crumbs bottom area -->
  <circle cx="80" cy="295" r="8" fill="rgba(212,165,116,0.2)"/>
  <circle cx="120" cy="310" r="5" fill="rgba(212,165,116,0.18)"/>
  <circle cx="220" cy="295" r="7" fill="rgba(212,165,116,0.2)"/>
  <circle cx="180" cy="308" r="5" fill="rgba(212,165,116,0.18)"/>
  <circle cx="150" cy="300" r="9" fill="rgba(212,165,116,0.15)"/>
  <!-- Brand strip -->
  <rect width="300" height="60" fill="rgba(30,10,5,0.75)"/>
  <text x="150" y="38" text-anchor="middle" font-family="'Arial Black',Arial,sans-serif" font-size="18" font-weight="900" fill="#FFFFFF" letter-spacing="5">ABC FOODS</text>
  <!-- Bottom bar -->
  <rect y="370" width="300" height="30" fill="rgba(30,10,5,0.7)"/>
  <text x="150" y="390" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#FFCC80" letter-spacing="2">COOKIES &amp; BISCUITS</text>
</svg>
