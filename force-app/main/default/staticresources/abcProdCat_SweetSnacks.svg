<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E91E63"/>
      <stop offset="100%" stop-color="#7B0040"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="300" height="400" fill="url(#bg)"/>
  <!-- Shine -->
  <ellipse cx="130" cy="85" rx="210" ry="110" fill="url(#shine)"/>
  <!-- Candy circles - large -->
  <circle cx="80" cy="130" r="45" fill="rgba(255,255,255,0.12)"/>
  <circle cx="220" cy="110" r="52" fill="rgba(255,255,255,0.09)"/>
  <circle cx="150" cy="200" r="65" fill="rgba(255,255,255,0.07)"/>
  <!-- Candy circles - small accent -->
  <circle cx="45" cy="195" r="22" fill="rgba(255,200,220,0.2)"/>
  <circle cx="260" cy="180" r="18" fill="rgba(255,200,220,0.18)"/>
  <circle cx="100" cy="265" r="16" fill="rgba(255,150,180,0.2)"/>
  <circle cx="210" cy="275" r="20" fill="rgba(255,150,180,0.18)"/>
  <!-- Gummy heart shapes (simplified) -->
  <ellipse cx="150" cy="195" rx="28" ry="22" fill="rgba(255,100,150,0.3)" transform="rotate(-10,150,195)"/>
  <ellipse cx="150" cy="195" rx="28" ry="22" fill="rgba(255,100,150,0.25)" transform="rotate(10,150,195)"/>
  <circle cx="150" cy="195" r="16" fill="rgba(255,255,255,0.25)"/>
  <!-- Swirl decoration -->
  <path d="M100,240 Q130,215 150,240 Q170,265 200,240" stroke="rgba(255,200,220,0.4)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M85,258 Q120,230 150,258 Q180,286 215,258" stroke="rgba(255,200,220,0.25)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Candy dot trail -->
  <circle cx="60" cy="310" r="7" fill="rgba(255,255,255,0.2)"/>
  <circle cx="85" cy="320" r="5" fill="rgba(255,255,255,0.15)"/>
  <circle cx="240" cy="315" r="7" fill="rgba(255,255,255,0.2)"/>
  <circle cx="215" cy="325" r="5" fill="rgba(255,255,255,0.15)"/>
  <!-- Brand strip -->
  <rect width="300" height="60" fill="rgba(70,0,30,0.72)"/>
  <text x="150" y="38" text-anchor="middle" font-family="'Arial Black',Arial,sans-serif" font-size="18" font-weight="900" fill="#FFFFFF" letter-spacing="5">ABC FOODS</text>
  <!-- Bottom bar -->
  <rect y="370" width="300" height="30" fill="rgba(70,0,30,0.6)"/>
  <text x="150" y="390" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#FFCDD2" letter-spacing="3">SWEET SNACKS</text>
</svg>
