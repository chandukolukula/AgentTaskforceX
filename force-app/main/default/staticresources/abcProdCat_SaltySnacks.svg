<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#B22200"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="300" height="400" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <ellipse cx="120" cy="90" rx="220" ry="120" fill="url(#shine)"/>
  <!-- Large chip triangles -->
  <polygon points="75,75 145,195 5,195" fill="rgba(255,220,0,0.22)" transform="rotate(-12,75,135)"/>
  <polygon points="225,65 295,185 155,185" fill="rgba(255,220,0,0.18)" transform="rotate(9,225,125)"/>
  <polygon points="148,190 205,265 91,265" fill="rgba(255,255,255,0.14)" transform="rotate(-4,148,227)"/>
  <!-- Small accent chips -->
  <polygon points="45,215 80,270 10,270" fill="rgba(255,220,0,0.13)" transform="rotate(-20,45,242)"/>
  <polygon points="260,200 295,258 225,258" fill="rgba(255,220,0,0.13)" transform="rotate(15,260,229)"/>
  <!-- Center crunch burst -->
  <circle cx="150" cy="210" r="55" fill="rgba(255,255,255,0.07)"/>
  <circle cx="150" cy="210" r="32" fill="rgba(255,200,0,0.14)"/>
  <circle cx="150" cy="210" r="14" fill="rgba(255,255,255,0.22)"/>
  <!-- Crunch dot pattern -->
  <circle cx="125" cy="195" r="5" fill="rgba(255,255,255,0.25)"/>
  <circle cx="168" cy="200" r="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="140" cy="225" r="5" fill="rgba(255,255,255,0.2)"/>
  <circle cx="165" cy="225" r="3" fill="rgba(255,255,255,0.18)"/>
  <!-- Wave texture lines -->
  <path d="M0,310 Q75,295 150,310 Q225,325 300,310" stroke="rgba(255,255,255,0.2)" stroke-width="2.5" fill="none"/>
  <path d="M0,325 Q75,310 150,325 Q225,340 300,325" stroke="rgba(255,255,255,0.12)" stroke-width="1.8" fill="none"/>
  <path d="M0,340 Q75,325 150,340 Q225,355 300,340" stroke="rgba(255,255,255,0.07)" stroke-width="1.5" fill="none"/>
  <!-- Brand strip top -->
  <rect width="300" height="60" rx="0" fill="rgba(80,10,0,0.72)"/>
  <text x="150" y="38" text-anchor="middle" font-family="'Arial Black',Arial,sans-serif" font-size="18" font-weight="900" fill="#FFFFFF" letter-spacing="5">ABC FOODS</text>
  <!-- Bottom accent bar -->
  <rect y="370" width="300" height="30" fill="rgba(80,10,0,0.55)"/>
  <text x="150" y="390" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#FFD700" letter-spacing="3">SALTY SNACKS</text>
</svg>
