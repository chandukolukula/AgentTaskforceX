<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A3000"/>
      <stop offset="50%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#2A1800"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,215,0,0)"/>
      <stop offset="50%" stop-color="rgba(255,215,0,0.7)"/>
      <stop offset="100%" stop-color="rgba(255,215,0,0)"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,215,0,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,215,0,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="300" height="400" fill="url(#bg)"/>
  <!-- Golden shine -->
  <ellipse cx="150" cy="85" rx="210" ry="100" fill="url(#shine)"/>
  <!-- Gold ornamental border lines -->
  <rect x="15" y="70" width="270" height="2" fill="url(#goldLine)"/>
  <rect x="15" y="360" width="270" height="2" fill="url(#goldLine)"/>
  <rect x="15" y="75" width="270" height="1" fill="url(#goldLine)" opacity="0.5"/>
  <!-- Large center star -->
  <polygon points="150,95 158,122 186,122 164,138 172,165 150,148 128,165 136,138 114,122 142,122" fill="#FFD700" opacity="0.85"/>
  <!-- Star glow -->
  <polygon points="150,95 158,122 186,122 164,138 172,165 150,148 128,165 136,138 114,122 142,122" fill="rgba(255,255,200,0.2)" transform="scale(1.15) translate(-20,-12)"/>
  <!-- Smaller stars -->
  <polygon points="65,155 69,168 83,168 72,175 76,188 65,181 54,188 58,175 47,168 61,168" fill="#FFD700" opacity="0.7"/>
  <polygon points="235,145 239,158 253,158 242,165 246,178 235,171 224,178 228,165 217,158 231,158" fill="#FFD700" opacity="0.7"/>
  <!-- Diamond shapes -->
  <polygon points="150,185 165,205 150,225 135,205" fill="rgba(255,215,0,0.3)" stroke="#FFD700" stroke-width="1.5"/>
  <polygon points="90,210 102,226 90,242 78,226" fill="rgba(255,215,0,0.2)" stroke="#FFD700" stroke-width="1"/>
  <polygon points="210,210 222,226 210,242 198,226" fill="rgba(255,215,0,0.2)" stroke="#FFD700" stroke-width="1"/>
  <!-- Decorative dots -->
  <circle cx="150" cy="255" r="5" fill="#FFD700" opacity="0.6"/>
  <circle cx="130" cy="265" r="3" fill="#FFD700" opacity="0.4"/>
  <circle cx="170" cy="265" r="3" fill="#FFD700" opacity="0.4"/>
  <circle cx="115" cy="278" r="3" fill="#FFD700" opacity="0.3"/>
  <circle cx="185" cy="278" r="3" fill="#FFD700" opacity="0.3"/>
  <!-- Ribbon accent -->
  <path d="M60,305 Q150,290 240,305" stroke="#FFD700" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M75,315 Q150,302 225,315" stroke="#FFD700" stroke-width="1" fill="none" opacity="0.35"/>
  <!-- Brand strip -->
  <rect width="300" height="60" fill="rgba(20,10,0,0.82)"/>
  <rect width="300" height="60" fill="url(#goldLine)" opacity="0.1"/>
  <text x="150" y="38" text-anchor="middle" font-family="'Arial Black',Arial,sans-serif" font-size="18" font-weight="900" fill="#FFD700" letter-spacing="5">ABC FOODS</text>
  <!-- Bottom bar -->
  <rect y="370" width="300" height="30" fill="rgba(20,10,0,0.8)"/>
  <text x="150" y="390" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#FFD700" letter-spacing="3">PREMIUM RANGE</text>
</svg>
