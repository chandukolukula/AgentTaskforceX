<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6A1B9A"/>
      <stop offset="100%" stop-color="#1A0035"/>
    </linearGradient>
    <linearGradient id="chocGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5D4037"/>
      <stop offset="100%" stop-color="#3E2723"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="300" height="400" fill="url(#bg)"/>
  <!-- Shine -->
  <ellipse cx="110" cy="90" rx="200" ry="100" fill="url(#shine)"/>
  <!-- Chocolate square grid -->
  <rect x="68" y="90" width="42" height="42" rx="4" fill="url(#chocGrad)" opacity="0.65"/>
  <rect x="114" y="90" width="42" height="42" rx="4" fill="url(#chocGrad)" opacity="0.55"/>
  <rect x="160" y="90" width="42" height="42" rx="4" fill="url(#chocGrad)" opacity="0.65"/>
  <rect x="68" y="136" width="42" height="42" rx="4" fill="url(#chocGrad)" opacity="0.55"/>
  <rect x="114" y="136" width="42" height="42" rx="4" fill="url(#chocGrad)" opacity="0.7"/>
  <rect x="160" y="136" width="42" height="42" rx="4" fill="url(#chocGrad)" opacity="0.55"/>
  <!-- Grid lines (snap lines on chocolate) -->
  <line x1="68" y1="111" x2="202" y2="111" stroke="rgba(150,80,40,0.5)" stroke-width="2"/>
  <line x1="111" y1="90" x2="111" y2="178" stroke="rgba(150,80,40,0.5)" stroke-width="2"/>
  <line x1="157" y1="90" x2="157" y2="178" stroke="rgba(150,80,40,0.5)" stroke-width="2"/>
  <line x1="68" y1="157" x2="202" y2="157" stroke="rgba(150,80,40,0.5)" stroke-width="2"/>
  <!-- Chocolate shine highlight -->
  <rect x="72" y="93" width="18" height="8" rx="3" fill="rgba(255,255,255,0.18)"/>
  <rect x="118" y="93" width="18" height="8" rx="3" fill="rgba(255,255,255,0.14)"/>
  <rect x="164" y="93" width="18" height="8" rx="3" fill="rgba(255,255,255,0.18)"/>
  <!-- Swirl decoration -->
  <path d="M150,210 Q175,195 185,215 Q195,235 175,245 Q155,255 145,235 Q135,215 150,210" stroke="rgba(206,147,216,0.5)" stroke-width="2.5" fill="none"/>
  <path d="M150,210 Q130,215 128,230 Q126,248 145,252" stroke="rgba(206,147,216,0.3)" stroke-width="1.5" fill="none"/>
  <!-- Purple sparkle dots -->
  <circle cx="55" cy="200" r="8" fill="rgba(206,147,216,0.3)"/>
  <circle cx="245" cy="195" r="6" fill="rgba(206,147,216,0.3)"/>
  <circle cx="70" cy="270" r="10" fill="rgba(206,147,216,0.2)"/>
  <circle cx="235" cy="265" r="8" fill="rgba(206,147,216,0.2)"/>
  <circle cx="150" cy="285" r="12" fill="rgba(206,147,216,0.15)"/>
  <!-- Star accent -->
  <polygon points="150,305 154,318 168,318 157,326 161,340 150,332 139,340 143,326 132,318 146,318" fill="rgba(206,147,216,0.3)"/>
  <!-- Brand strip -->
  <rect width="300" height="60" fill="rgba(20,0,50,0.78)"/>
  <text x="150" y="38" text-anchor="middle" font-family="'Arial Black',Arial,sans-serif" font-size="18" font-weight="900" fill="#FFFFFF" letter-spacing="5">ABC FOODS</text>
  <!-- Bottom bar -->
  <rect y="370" width="300" height="30" fill="rgba(20,0,50,0.7)"/>
  <text x="150" y="390" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#CE93D8" letter-spacing="3">CONFECTIONERY</text>
</svg>
