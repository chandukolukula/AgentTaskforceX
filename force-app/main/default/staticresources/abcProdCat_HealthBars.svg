<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#0D3B0F"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="300" height="400" fill="url(#bg)"/>
  <!-- Shine -->
  <ellipse cx="120" cy="85" rx="200" ry="105" fill="url(#shine)"/>
  <!-- Energy bar illustration - main bar -->
  <rect x="60" y="155" width="180" height="55" rx="8" fill="url(#barGrad)" opacity="0.85"/>
  <rect x="60" y="155" width="180" height="55" rx="8" fill="none" stroke="rgba(165,214,167,0.6)" stroke-width="2"/>
  <!-- Bar wrapper top fold -->
  <rect x="60" y="155" width="180" height="18" rx="8" fill="rgba(255,255,255,0.18)"/>
  <!-- Bar grid pattern (granola texture) -->
  <line x1="100" y1="158" x2="100" y2="207" stroke="rgba(46,125,50,0.4)" stroke-width="1.5"/>
  <line x1="140" y1="158" x2="140" y2="207" stroke="rgba(46,125,50,0.4)" stroke-width="1.5"/>
  <line x1="180" y1="158" x2="180" y2="207" stroke="rgba(46,125,50,0.4)" stroke-width="1.5"/>
  <line x1="220" y1="158" x2="220" y2="207" stroke="rgba(46,125,50,0.4)" stroke-width="1.5"/>
  <line x1="62" y1="178" x2="238" y2="178" stroke="rgba(46,125,50,0.35)" stroke-width="1.5"/>
  <line x1="62" y1="193" x2="238" y2="193" stroke="rgba(46,125,50,0.35)" stroke-width="1.5"/>
  <!-- Grain/seed dots on bar -->
  <circle cx="90" cy="170" r="3" fill="rgba(46,80,20,0.5)"/>
  <circle cx="115" cy="185" r="3" fill="rgba(46,80,20,0.45)"/>
  <circle cx="155" cy="168" r="3" fill="rgba(46,80,20,0.5)"/>
  <circle cx="175" cy="195" r="3" fill="rgba(46,80,20,0.45)"/>
  <circle cx="210" cy="172" r="3" fill="rgba(46,80,20,0.5)"/>
  <!-- Leaf decorations -->
  <path d="M60,100 Q80,80 100,100 Q80,120 60,100 Z" fill="rgba(165,214,167,0.3)"/>
  <path d="M200,90 Q220,70 240,90 Q220,110 200,90 Z" fill="rgba(165,214,167,0.25)"/>
  <path d="M40,250 Q60,230 80,250 Q60,270 40,250 Z" fill="rgba(165,214,167,0.2)"/>
  <path d="M220,255 Q240,235 260,255 Q240,275 220,255 Z" fill="rgba(165,214,167,0.2)"/>
  <!-- Oat/grain ovals -->
  <ellipse cx="80" cy="130" rx="18" ry="8" fill="rgba(165,214,167,0.25)" transform="rotate(-20,80,130)"/>
  <ellipse cx="220" cy="125" rx="15" ry="7" fill="rgba(165,214,167,0.22)" transform="rotate(15,220,125)"/>
  <ellipse cx="150" cy="110" rx="20" ry="9" fill="rgba(165,214,167,0.2)" transform="rotate(5,150,110)"/>
  <!-- Fitness lightning bolt accent -->
  <polygon points="155,230 145,260 155,255 145,285 165,250 153,255" fill="rgba(165,214,167,0.4)"/>
  <!-- Circular progress accent -->
  <circle cx="150" cy="300" r="25" fill="none" stroke="rgba(165,214,167,0.3)" stroke-width="3" stroke-dasharray="110,50"/>
  <circle cx="150" cy="300" r="16" fill="rgba(165,214,167,0.12)"/>
  <!-- Brand strip -->
  <rect width="300" height="60" fill="rgba(5,25,5,0.78)"/>
  <text x="150" y="38" text-anchor="middle" font-family="'Arial Black',Arial,sans-serif" font-size="18" font-weight="900" fill="#FFFFFF" letter-spacing="5">ABC FOODS</text>
  <!-- Bottom bar -->
  <rect y="370" width="300" height="30" fill="rgba(5,25,5,0.72)"/>
  <text x="150" y="390" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#A5D6A7" letter-spacing="3">HEALTH BARS</text>
</svg>
